name: Create Release

on:
  push:
    tags:
      - 'v*'  # 当推送 v* 标签时触发（如 v1.0.0）

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Python 3.10
        uses: actions/setup-python@v3
        with:
          python-version: '3.10'
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest
          if [ -f session-4/requirements.txt ]; then pip install -r session-4/requirements.txt; fi
          
      - name: Run tests
        run: |
          cd session-4
          python -m pytest tests/test_all.py -v

  release:
    needs: test
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    
    steps:
      - uses: actions/checkout@v3
      
      - name: Create Release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref }}
          release_name: Release ${{ github.ref }}
          body: |
            ## PyTest TDD Practice Release
            
            ### 🎉 新版本发布！
            
            **包含内容：**
            - ✅ 6个 Python 基础练习
            - ✅ 完整的 PyTest 测试套件
            - ✅ 自动化 CI/CD 流程
            - ✅ 所有测试通过
            
            **练习内容：**
            1. 列表操作：查找重复元素
            2. 集合操作：差集运算
            3. 元组操作：元素平方
            4. 字典操作：合并并累加
            5. 面向对象：ToDo 列表类
            6. 函数操作：展平嵌套列表
            
            **如何使用：**
            ```bash
            git clone https://github.com/Asunald/practice_pytest_TDD.git
            cd practice_pytest_TDD/session-4
            pip install -r requirements.txt
            pytest tests/test_all.py -v
            ```
            
            ### 📊 测试结果
            所有 6 个测试用例均通过 ✅
            
          draft: false
          prerelease: false