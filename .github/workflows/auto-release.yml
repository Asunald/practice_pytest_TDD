name: Auto Release

on:
  workflow_dispatch:  # 只允许手动触发，避免每次推送都创建 release

jobs:
  test-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Set up Python 3.10
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest
          
      - name: Install project dependencies
        run: |
          cd session-4
          pip install -r requirements.txt
          
      - name: Run tests
        run: |
          cd session-4
          python -m pytest tests/test_all.py -v
          
      - name: Generate version
        id: version
        run: |
          VERSION="v$(date +'%Y.%m.%d')-$(date +'%H%M')"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Generated version: $VERSION"
          
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: PyTest TDD Practice ${{ steps.version.outputs.version }}
          body: |
            ## 🎯 PyTest TDD 练习项目 - 自动发布
            
            **发布时间：** ${{ steps.version.outputs.version }}
            
            ### ✅ 测试状态
            所有 6 个测试用例通过！
            
            ### 📚 项目内容
            - **列表练习**：查找重复元素
            - **集合练习**：差集运算  
            - **元组练习**：元素平方
            - **字典练习**：合并字典
            - **OOP练习**：ToDo 列表类
            - **函数练习**：展平列表
            
            ### 🚀 快速开始
            ```bash
            git clone https://github.com/Asunald/practice_pytest_TDD.git
            cd practice_pytest_TDD/session-4
            pip install -r requirements.txt
            pytest tests/test_all.py -v
            ```
            
            ---
            *手动触发的自动发布*
          draft: false
          prerelease: false