name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  test-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python 3.10
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest
          
      - name: Run tests
        run: |
          python -m pytest tests/test_all.py -v
      
      - name: Extract tag name
        id: tag
        run: echo "tag=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
      
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: Python Practice ${{ steps.tag.outputs.tag }}
          body: |
            ## Python Practice Release ${{ steps.tag.outputs.tag }}
            
            ### Features
            - List operations: Find duplicates
            - Set operations: Difference calculation  
            - Tuple operations: Element squaring
            - Dictionary operations: Merge with sum
            - Object-oriented: ToDo list class
            - Function operations: Flatten nested lists
            
            ### Usage
            ```bash
            git clone https://github.com/Asunald/practice_pytest_TDD.git
            pip install -r requirements.txt
            pytest tests/test_all.py -v
            ```
            
            ### Requirements
            - Python 3.10+
            - PyTest framework
            
            All tests passing ✓
          draft: false
          prerelease: false