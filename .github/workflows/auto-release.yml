name: Auto Release

on:
  push:
    branches: [ main ]
  workflow_dispatch:  # 允许手动触发

jobs:
  test-and-release:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0  # 获取完整历史记录
      
      - name: Set up Python 3.10
        uses: actions/setup-python@v3
        with:
          python-version: '3.10'
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest
          if [ -f session-4/requirements.txt ]; then pip install -r session-4/requirements.txt; fi
          
      - name: Run tests
        run: |
          cd session-4
          python -m pytest tests/test_all.py -v
          
      - name: Generate version
        id: version
        run: |
          # 生成基于时间的版本号
          VERSION="v$(date +'%Y.%m.%d')-$(date +'%H%M')"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Generated version: $VERSION"
          
      - name: Create Release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ steps.version.outputs.version }}
          release_name: PyTest TDD Practice ${{ steps.version.outputs.version }}
          body: |
            ## 🎯 PyTest TDD 练习项目
            
            **发布时间：** $(date +'%Y-%m-%d %H:%M:%S')
            
            ### ✅ 测试状态
            所有 6 个测试用例通过！
            
            ### 📚 项目内容
            - **列表练习**：查找重复元素
            - **集合练习**：差集运算  
            - **元组练习**：元素平方
            - **字典练习**：合并字典
            - **OOP练习**：ToDo 列表类
            - **函数练习**：展平列表
            
            ### 🚀 快速开始
            ```bash
            # 克隆项目
            git clone https://github.com/Asunald/practice_pytest_TDD.git
            cd practice_pytest_TDD/session-4
            
            # 安装依赖
            pip install -r requirements.txt
            
            # 运行测试
            pytest tests/test_all.py -v
            ```
            
            ### 📊 CI/CD 状态
            - ✅ 自动化测试通过
            - ✅ 代码质量检查通过
            - ✅ 自动发布成功
            
            ---
            *此版本由 GitHub Actions 自动生成和发布*
          draft: false
          prerelease: false