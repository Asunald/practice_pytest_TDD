name: Create Release

on:
  push:
    tags:
      - 'v*'

jobs:
  test-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python 3.10
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest
          
      - name: Run tests
        run: |
          python -m pytest tests/test_all.py -v
      
      - name: Extract tag name
        id: tag
        run: echo "tag=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
      
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: PyTest TDD Practice ${{ steps.tag.outputs.tag }}
          body: |
            ## 🎯 PyTest TDD Practice Release ${{ steps.tag.outputs.tag }}
            
            ### ✅ 测试状态
            所有 6 个测试用例通过！
            
            ### 📚 项目内容
            - **列表练习**：查找重复元素 `find_duplicates()`
            - **集合练习**：差集运算 `difference_set()`
            - **元组练习**：元素平方 `square_tuple()`
            - **字典练习**：合并字典 `merge_dicts()`
            - **OOP练习**：ToDo 列表类 `ToDo`
            - **函数练习**：展平列表 `flatten_list_once()`
            
            ### 🚀 快速开始
            ```bash
            git clone https://github.com/Asunald/practice_pytest_TDD.git
            pip install -r requirements.txt
            pytest tests/test_all.py -v
            ```
            
            ### 📊 技术栈
            - Python 3.10+
            - PyTest 测试框架
            - GitHub Actions CI/CD
            
            ---
            *PyTest & TDD 练习项目*
          draft: false
          prerelease: false